<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francisco Muñoz Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a; /* Negro grisáceo oscuro */
            color: #f5f5f5; /* Blanco suave */
        }

        h1, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Cuadrícula de Estilo Masonry */
        .gallery-container {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) {
            .gallery-container { column-count: 2; }
        }
        @media (min-width: 1280px) {
            .gallery-container { column-count: 3; }
        }

        .img-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 1.5rem;
            background-color: #171717;
            overflow: hidden; /* Recorte crucial para el zoom */
            border-radius: 0px; 
        }

        .img-item img {
            display: block;
            width: 100%;
            height: auto;
            transition: opacity 0.4s ease, transform 0.4s ease;
            border-radius: 0px;
            /* Aplicamos zoom a TODAS las fotos para ocultar bordes de escaneado */
            transform: scale(1.10); 
        }

        .img-item:hover img {
            opacity: 0.8;
            transform: scale(1.12); /* Efecto sutil al pasar el mouse */
        }

        /* Formato 120 (Cuadrado) */
        .format-120 { 
            aspect-ratio: 1 / 1; 
            position: relative;
        }
        
        .format-120 img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .nav-link {
            position: relative;
            transition: color 0.3s;
            color: #a3a3a3;
        }
        .nav-link:hover {
            color: #ffffff;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #ffffff;
            transition: width 0.3s;
        }
        .nav-link:hover::after {
            width: 100%;
        }

        .section {
            display: none;
            opacity: 0;
        }
        .section.active {
            display: block;
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        nav {
            border-bottom: none;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navegación -->
    <nav class="fixed w-full top-0 bg-[#0a0a0a]/90 backdrop-blur-sm z-50 py-10 px-6 md:px-20 flex justify-between items-baseline">
        <div>
            <a href="#" onclick="showSection('portfolio')" class="text-xl md:text-2xl font-serif tracking-tight text-white">Francisco Muñoz</a>
        </div>
        <div class="flex space-x-6 md:space-x-10 text-[10px] md:text-xs uppercase tracking-[0.2em]">
            <a href="javascript:void(0)" onclick="showSection('portfolio')" class="nav-link font-medium">Portfolio</a>
            <a href="javascript:void(0)" onclick="showSection('about')" class="nav-link font-medium">About</a>
        </div>
    </nav>

    <main class="pt-36 pb-20 px-6 md:px-20 max-w-[1400px] mx-auto">
        
        <!-- Sección Portfolio -->
        <section id="portfolio" class="section active">
            <div class="gallery-container">
                
                <!-- 1. Formato 120 (Torres Eléctricas) -->
                <div class="img-item format-120">
                    <img src="https://i.imgur.com/ZMzKiDm.jpeg" alt="Fotografía Formato 120 - Torres Eléctricas">
                </div>

                <!-- 2. Callejón -->
                <div class="img-item">
                    <img src="https://i.imgur.com/CqRwMER.jpeg" alt="Fotografía 35mm - Callejón">
                </div>

                <!-- 3. Estación de tren -->
                <div class="img-item">
                    <img src="https://i.imgur.com/VzQVXqO.jpeg" alt="Fotografía 35mm - Estación">
                </div>

                <!-- 4. Dardos -->
                <div class="img-item">
                    <img src="https://i.imgur.com/N3DuSYm.jpeg" alt="Fotografía 35mm - Dardos">
                </div>

                <!-- 5. Formato 120 (Edificio Noche) -->
                <div class="img-item format-120">
                    <img src="https://i.imgur.com/qtvq6oi.jpeg" alt="Fotografía Formato 120 - Edificio">
                </div>

                <!-- 6. Urbano -->
                <div class="img-item">
                    <img src="https://i.imgur.com/NXGpWAy.jpeg" alt="Fotografía 35mm - Urbano">
                </div>

                <!-- 7. Formato 120 (Interior) -->
                <div class="img-item format-120">
                    <img src="https://i.imgur.com/ebsCSrn.jpeg" alt="Fotografía Formato 120 - Interior">
                </div>

                <!-- 8. Perspectiva -->
                <div class="img-item">
                    <img src="https://i.imgur.com/ARJqSQk.jpeg" alt="Fotografía 35mm - Perspectiva">
                </div>

                <!-- 9. Estructura -->
                <div class="img-item">
                    <img src="https://i.imgur.com/wYnr4WZ.jpeg" alt="Fotografía 35mm - Estructura">
                </div>

                <!-- 10. Geometría -->
                <div class="img-item">
                    <img src="https://i.imgur.com/76yQpL3.jpeg" alt="Fotografía 35mm - Geometría">
                </div>

                <!-- 11. Sombras -->
                <div class="img-item">
                    <img src="https://i.imgur.com/hh9ZfqB.jpeg" alt="Fotografía 35mm - Sombras">
                </div>

                <!-- 12. Luz -->
                <div class="img-item">
                    <img src="https://i.imgur.com/wgEapz3.jpeg" alt="Fotografía 35mm - Luz">
                </div>

                <!-- 13. Nueva Imagen Final -->
                <div class="img-item">
                    <img src="https://i.imgur.com/sbqfM4u.jpeg" alt="Fotografía 35mm - Nueva Final">
                </div>

            </div>
        </section>

        <!-- Sección Sobre mí -->
        <section id="about" class="section max-w-2xl mx-auto pt-10">
            <div class="flex flex-col items-start">
                <!-- Imagen completa sin recorte -->
                <div class="w-full mb-12 bg-neutral-900 overflow-hidden">
                    <img src="https://i.imgur.com/XIee0s6.jpeg" alt="Retrato Francisco Muñoz" class="w-full h-auto grayscale opacity-90" style="transform: scale(1.1);">
                </div>
                
                <!-- Texto debajo de la imagen -->
                <div class="w-full">
                    <div class="space-y-6 text-neutral-400 text-lg leading-relaxed font-light">
                        <p>
                            I am a visual artist based in Helsinki with an interest in analog photography. My work focuses on urban documentation and the beauty found in everyday life.
                        </p>
                    </div>
                    
                    <div class="mt-12 pt-10 border-t border-neutral-800">
                        <p class="text-[10px] uppercase tracking-widest text-neutral-500 mb-6">Contact & Social</p>
                        <div class="flex flex-col space-y-3 font-light text-neutral-200">
                            <span>fa.munozf@gmail.com</span>
                            <!-- Cambio solicitado: "@francisco.amf on instagram" con color diferenciado -->
                            <span>@francisco.amf <span class="text-neutral-500">on instagram</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
